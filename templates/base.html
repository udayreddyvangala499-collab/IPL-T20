<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}IPL Analytics Dashboard{% endblock %}</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <nav class="navbar">

        <div class="logo">
            🏏 IPL Analytics
        </div>

        <div class="menu-toggle" id="menu-toggle">
            ☰
        </div>

        <ul class="nav-menu" id="nav-menu">
            <li><a href="/">Home</a></li>
            <li><a href="/teams">Team Analytics</a></li>
            <li><a href="/players">Player Analytics</a></li>
            <li><a href="/h2h">Head-to-Head</a></li>
            <li><a href="/predictor">Match Predictor</a></li>
            <li><a href="/about">About</a></li>
        </ul>

    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <script>
        const toggle = document.getElementById("menu-toggle");
        const menu = document.getElementById("nav-menu");

        toggle.addEventListener("click", () => {
            menu.classList.toggle("show");
        });
    </script>

</body>
</html>
