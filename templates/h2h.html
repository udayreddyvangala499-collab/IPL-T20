{% extends "base.html" %}

{% block content %}

<section class="teams-hero">

    <div class="container-xl">

        <span class="page-badge">
            IPL Teams Analytics
        </span>

        <h1>
            Explore IPL Teams
        </h1>

        <p>
            Analyze team performance, winning percentage,
            championships and historical records.
        </p>

    </div>

</section>

<section class="container-xl py-5">

    <div class="row g-4">

        {% for team in teams %}

        <div class="col-lg-3 col-md-4 col-sm-6">

            <div class="team-analytics-card">

                <img
                    src="{{ url_for('static',
                    filename='images/' + team.logo) }}"
                    alt="{{ team.name }}">

                <h5>{{ team.name }}</h5>

                <a href="#" class="btn btn-primary">
                    View Analytics
                </a>

            </div>

        </div>

        {% endfor %}

    </div>

</section>

{% endblock %}
